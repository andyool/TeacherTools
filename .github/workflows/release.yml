name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-mac
          if-no-files-found: error
          path: |
            release/TeacherTools-mac-universal.dmg
            release/TeacherTools-mac-universal.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-win
          if-no-files-found: error
          path: |
            release/TeacherTools-windows-setup.exe
            release/TeacherTools-windows-portable.exe

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-windows
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          assets=(
            "release-artifacts/release-assets-mac/TeacherTools-mac-universal.dmg"
            "release-artifacts/release-assets-mac/TeacherTools-mac-universal.zip"
            "release-artifacts/release-assets-win/TeacherTools-windows-setup.exe"
            "release-artifacts/release-assets-win/TeacherTools-windows-portable.exe"
          )

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --repo "$REPO" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --repo "$REPO" --generate-notes --latest
          fi
