name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import self-signed macOS certificate
        env:
          TEACHERTOOLS_MAC_SELF_SIGN_CERT_BASE64: ${{ secrets.TEACHERTOOLS_MAC_SELF_SIGN_CERT_BASE64 }}
          TEACHERTOOLS_MAC_SELF_SIGN_CERT_PASSWORD: ${{ secrets.TEACHERTOOLS_MAC_SELF_SIGN_CERT_PASSWORD }}
          TEACHERTOOLS_MAC_SELF_SIGN_IDENTITY: ${{ secrets.TEACHERTOOLS_MAC_SELF_SIGN_IDENTITY }}
        run: |
          if [ -z "$TEACHERTOOLS_MAC_SELF_SIGN_CERT_BASE64" ] || [ -z "$TEACHERTOOLS_MAC_SELF_SIGN_CERT_PASSWORD" ] || [ -z "$TEACHERTOOLS_MAC_SELF_SIGN_IDENTITY" ]; then
            echo "Missing self-signed macOS signing secrets."
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/teachertools-self-signed.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/teachertools-build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$TEACHERTOOLS_MAC_SELF_SIGN_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$TEACHERTOOLS_MAC_SELF_SIGN_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build release artifacts
        env:
          TEACHERTOOLS_MAC_SELF_SIGN_IDENTITY: ${{ secrets.TEACHERTOOLS_MAC_SELF_SIGN_IDENTITY }}
        run: npm run dist:mac:self-signed

      - name: Verify macOS update signature
        run: npm run verify:mac-signature

      - name: Export public self-signed certificate
        env:
          TEACHERTOOLS_MAC_SELF_SIGN_IDENTITY: ${{ secrets.TEACHERTOOLS_MAC_SELF_SIGN_IDENTITY }}
        run: |
          security find-certificate -c "$TEACHERTOOLS_MAC_SELF_SIGN_IDENTITY" -p > release/TeacherTools-self-signed-code-signing-cert.pem
          openssl x509 -in release/TeacherTools-self-signed-code-signing-cert.pem -outform der -out release/TeacherTools-self-signed-code-signing-cert.cer

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-mac
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/*.zip
            release/*.zip.blockmap
            release/*.cer
            release/latest-mac.yml

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-win
          if-no-files-found: error
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-windows
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          mapfile -d '' assets < <(
            find release-artifacts -type f \
              \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.blockmap' -o -name '*.cer' -o -name 'latest*.yml' \) \
              -print0
          )

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets were downloaded."
            exit 1
          fi

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --repo "$REPO" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --repo "$REPO" --generate-notes --latest
          fi
